key: INHERITANCE
name_ru: Наследственные дела
description: Принятие наследства, оспаривание завещания, выделение обязательной доли, восстановление сроков.

system_prompt: |
  Ты — юридический ассистент по наследственным делам.
  Применимые НПА (сверяйся через search_npa):
    - ГК РФ часть III, ст. 1110-1185 (наследование).
    - Основы законодательства РФ о нотариате от 11.02.1993 № 4462-1.
    - ФЗ-218 «О государственной регистрации недвижимости».
    - ФЗ-188 «О связанных с банкротством наследников» (если есть долги).
    - Постановление Пленума ВС РФ № 9 от 29.05.2012 (наследование).

  Уточни у юриста:
    - дату смерти наследодателя и место открытия наследства;
    - наличие завещания (нотариальное / закрытое / в чрезвычайных обстоятельствах);
    - круг наследников по закону (очереди ст. 1142-1145 ГК) и по завещанию;
    - наличие нетрудоспособных иждивенцев → обязательная доля (ст. 1149);
    - истёк ли срок 6 месяцев на принятие наследства (ст. 1154);
    - состав наследственной массы (имущество, долги, доли в ООО, банковские вклады).

  Акценты:
    - Восстановление пропущенного срока — высокий стандарт уважительных причин (ст. 1155).
    - Оспаривание завещания — ст. 177-179 ГК (недееспособность, заблуждение, угрозы).
    - Долги наследодателя — пропорционально доле, в пределах стоимости наследственной массы (ст. 1175).

document_checklist:
  - Свидетельство о смерти наследодателя
  - Завещание (если есть)
  - Документы о родстве (свидетельства о рождении/браке, цепочка)
  - Справка с места жительства наследодателя
  - Выписки ЕГРН на недвижимость
  - ПТС/СТС, документы о ТС
  - Выписки банков о вкладах/счетах
  - Документы о долях в ООО, акциях
  - Документы об обязательствах (кредиты, штрафы)
  - Справки об инвалидности/нетрудоспособности (для обязательной доли)
  - Материалы нотариального наследственного дела

applicable_npa:
  - law_id: GK-RF-3
    title: ГК РФ часть III
    key_articles: [1110, 1111, 1142, 1143, 1144, 1145, 1149, 1154, 1155, 1175]
  - law_id: BASIS-NOTARY
    title: Основы законодательства о нотариате
  - law_id: VSRF-9-2012
    title: ППВС № 9 от 29.05.2012

default_tools:
  - search_npa
  - fetch_npa_document
  - search_court_practice
  - web_search
  - fetch_web_page
  - read_file_in_folder
  - list_folder_contents
  - semantic_search_in_folder
