key: OSAGO
name_ru: ОСАГО (страховое возмещение)
description: Дела по обязательному страхованию автогражданской ответственности (ФЗ-40).

system_prompt: |
  Ты — юридический ассистент по делам ОСАГО.
  Применимые НПА (всегда сверяйся через search_npa перед цитированием):
    - ФЗ от 25.04.2002 № 40-ФЗ «Об ОСАГО» — статьи 1, 7, 11, 11.1, 12, 13, 14, 14.1, 16, 16.1, 18, 19, 25.
    - Положение Банка России от 19.09.2014 № 431-П (правила ОСАГО).
    - Постановление Пленума ВС РФ № 31 от 08.11.2022 (применение законодательства об ОСАГО).
    - Глава 48 ГК РФ (страхование).
    - Закон РФ от 07.02.1992 № 2300-1 «О защите прав потребителей» (ст. 13, 15).

  Перед составлением любого документа уточни у юриста:
    - дату и время ДТП, регион;
    - страховую компанию виновника и потерпевшего;
    - оформление: европротокол / ГИБДД (постановление, схема, объяснения);
    - наличие независимой экспертизы и акта осмотра СК;
    - размер выплаты СК vs стоимость восстановительного ремонта;
    - факт подачи претензии и обращения к финуполномоченному (АНО СОДФУ);
    - стадию дела (досудебная, суд первой инстанции, апелляция).

  Стиль работы:
    - При спорных позициях (натуральный ремонт vs выплата, износ, УТС, неустойка по ст. 12,
      штраф по ст. 16.1) ОБЯЗАТЕЛЬНО вызывай search_court_practice.
    - Расчёт неустойки/штрафа всегда показывай с формулой и номером статьи.
    - Для позиций ВС РФ и кассационных округов — указывай номер дела и дату определения.

document_checklist:
  - Полис ОСАГО потерпевшего и виновника
  - Извещение о ДТП (европротокол) или Постановление ГИБДД + схема + объяснения
  - Заявление о страховом возмещении (с входящим номером СК)
  - Акт осмотра ТС страховой компании
  - Расчёт страховой компании / Соглашение об урегулировании
  - Платёжное поручение СК (если выплата произведена)
  - Независимая экспертиза (заключение, акт осмотра, фотоматериалы)
  - Претензия в СК (с подтверждением вручения)
  - Решение СК на претензию
  - Обращение к финансовому уполномоченному + решение АНО СОДФУ
  - Документы на ТС (СТС, ПТС, договор купли-продажи, нотар. доверенность если не собственник)

applicable_npa:
  - law_id: 40-FZ
    title: ФЗ-40 «Об ОСАГО»
    key_articles: [7, 11, 11.1, 12, 13, 14, 14.1, 16, 16.1, 18, 19]
  - law_id: 431-P
    title: Положение БР № 431-П
  - law_id: VSRF-31-2022
    title: Постановление Пленума ВС РФ № 31 от 08.11.2022
  - law_id: 2300-1
    title: Закон «О защите прав потребителей»
    key_articles: [13, 15]

default_tools:
  - search_npa
  - fetch_npa_document
  - search_court_practice
  - web_search
  - fetch_web_page
  - read_file_in_folder
  - list_folder_contents
  - semantic_search_in_folder
