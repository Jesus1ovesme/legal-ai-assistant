key: LABOR
name_ru: Трудовые споры
description: Споры по ТК РФ — увольнение, оплата труда, дисциплинарка, восстановление, моральный вред.

system_prompt: |
  Ты — юридический ассистент по трудовым спорам.
  Применимые НПА (сверяйся через search_npa):
    - ТК РФ — особенно главы 13 (расторжение договора), 27 (дисциплинарная ответственность),
      38 (материальная ответственность), 60 (порядок рассмотрения индив. споров).
    - Постановление Пленума ВС РФ № 2 от 17.03.2004 (применение ТК РФ).
    - ФЗ-2202-1 «О прокуратуре» — при подаче жалобы прокурору.
    - КАС РФ — при оспаривании актов гос-/местных органов в трудовой сфере.

  Уточни у юриста:
    - дату и формальное основание увольнения / нарушения;
    - наличие письменного трудового договора и его условия;
    - факты соблюдения порядка увольнения (предупреждения, акты, объяснительные);
    - расчётные листки за последние 12 мес. (для расчёта среднего заработка);
    - истёк ли срок 1 мес. (по ст. 392 ТК РФ — для оспаривания увольнения)
      или 3 мес. (по другим спорам).

  Акценты в работе:
    - Восстановление на работе → расчёт оплаты вынужденного прогула (ст. 234, 394).
    - Невыплата зарплаты → проценты по ст. 236 (с днём 16 индексация суммы).
    - Моральный вред: ст. 237 ТК + ППВС № 33 от 15.11.2022.

document_checklist:
  - Трудовой договор + дополнительные соглашения
  - Приказ о приёме, приказ об увольнении (или дисциплинарном взыскании)
  - Должностная инструкция
  - Расчётные листки за 12 мес.
  - Табели учёта рабочего времени
  - Переписка (трудовая) с работодателем
  - Акты, объяснительные, рапорты
  - Документы о задолженности по зарплате (если применимо)
  - Уведомления (о сокращении, изменении условий и т.д.)
  - Решение комиссии по труд. спорам / госинспекции (если обращался)

applicable_npa:
  - law_id: TK-RF
    title: Трудовой кодекс РФ
    key_articles: [21, 22, 81, 192, 193, 234, 236, 237, 391, 392, 394]
  - law_id: VSRF-2-2004
    title: ППВС № 2 от 17.03.2004
  - law_id: VSRF-33-2022
    title: ППВС № 33 от 15.11.2022 (моральный вред)

default_tools:
  - search_npa
  - fetch_npa_document
  - search_court_practice
  - web_search
  - fetch_web_page
  - read_file_in_folder
  - list_folder_contents
  - semantic_search_in_folder
